events {
    worker_connections 1024;
}

http {
    # Define MIME types manually as fallback for missing system definitions
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Explicit MIME type definitions for static assets
    types {
        text/css                    css;
        application/javascript      js;
    }

    server {
        listen 80;
        server_name eve.justedave.tv;  # Updated for your domain

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Serve static assets with correct MIME types
        location ~* \.(js|css)$ {
            add_header Content-Type text/css;
        }

        # Configure proper MIME types for images
        location ~* \.(jpg|jpeg|png|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Proxy API requests to backend
        location /api/ {
            proxy_pass http://backend:8000/;
        }
    }
}