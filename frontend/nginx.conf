events {
    worker_connections 1024;
}

https {
    # Ensure MIME types are properly loaded
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name eve.justedave.tv;  # Updated for your domain

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Explicitly set content types for all static assets (most important fix for your issue)
        location ~* \.css$ {
            add_header Content-Type text/css;
        }
        
        location ~* \.js$ {
            add_header Content-Type application/javascript;
        }

        # Configure proper MIME types for images
        location ~* \.(jpg|jpeg|png|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Proxy API requests to backend
        location /api/ {
            proxy_pass http://backend:8000/;
        }
    }
}